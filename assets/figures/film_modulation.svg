<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-label="FiLM conditioning produces scale and shift parameters for hidden features">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #d8e2f0; stroke-width: 3; rx: 14; }
      .soft { fill: #f1f7ff; stroke: #d8e2f0; stroke-width: 3; rx: 14; }
      .label { font: 700 27px Inter, Arial, sans-serif; fill: #12213f; }
      .small { font: 500 20px Inter, Arial, sans-serif; fill: #42526b; }
      .math { font: 700 25px Inter, Arial, sans-serif; fill: #12213f; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); }
      .arrow2 { fill: none; stroke: #0891b2; stroke-width: 4; marker-end: url(#arrow-cyan); }
    </style>
  </defs>

  <rect x="45" y="70" width="230" height="105" class="box"/>
  <text x="160" y="114" text-anchor="middle" class="label">noisy features</text>
  <text x="160" y="148" text-anchor="middle" class="math">h</text>

  <rect x="45" y="255" width="230" height="105" class="box"/>
  <text x="160" y="299" text-anchor="middle" class="label">conditioning</text>
  <text x="160" y="333" text-anchor="middle" class="small">observation + diffusion step</text>

  <rect x="360" y="245" width="200" height="125" class="soft"/>
  <text x="460" y="293" text-anchor="middle" class="label">MLP</text>
  <text x="460" y="329" text-anchor="middle" class="math">&#947;(c), &#946;(c)</text>

  <rect x="650" y="125" width="225" height="150" class="soft"/>
  <text x="762.5" y="170" text-anchor="middle" class="label">modulated block</text>
  <text x="762.5" y="213" text-anchor="middle" class="math">h' = &#947;(c) &#8857; h + &#946;(c)</text>
  <text x="762.5" y="247" text-anchor="middle" class="small">scale and shift channels</text>

  <path d="M280 122 L638 174" class="arrow"/>
  <path d="M280 307 L348 307" class="arrow2"/>
  <path d="M565 302 C625 286 642 248 646 200" class="arrow2"/>

  <text x="460" y="410" text-anchor="middle" class="small">FiLM lets the same denoising backbone behave differently for different observations.</text>
</svg>
