<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion data modalities as tensors</title>
  <desc id="desc">Images, videos, and robot trajectories are represented as tensors before diffusion modeling.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fbff; }
      .card { fill: #ffffff; stroke: #d8e2f0; stroke-width: 2; rx: 14; }
      .head { font: 700 28px sans-serif; fill: #12213f; }
      .body { font: 500 22px sans-serif; fill: #1f2937; }
      .muted { font: 500 18px sans-serif; fill: #637083; }
      .eq { font: 700 24px monospace; fill: #12213f; }
      .accent { fill: #2563eb; }
      .teal { fill: #0891b2; }
      .amber { fill: #f59e0b; }
      .green { fill: #16a34a; }
      .red { fill: #dc2626; }
      .line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="560"/>

  <rect class="card" x="40" y="55" width="300" height="320"/>
  <rect class="card" x="400" y="55" width="300" height="320"/>
  <rect class="card" x="760" y="55" width="300" height="320"/>

  <text class="head" x="190" y="102" text-anchor="middle">Images</text>
  <text class="head" x="550" y="102" text-anchor="middle">Videos</text>
  <text class="head" x="910" y="102" text-anchor="middle">Robot trajectories</text>

  <rect x="110" y="145" width="150" height="110" fill="#dbeafe" stroke="#2563eb" stroke-width="3" rx="10"/>
  <rect x="130" y="128" width="150" height="110" fill="#e0f2fe" stroke="#0891b2" stroke-width="3" rx="10"/>
  <rect x="150" y="111" width="150" height="110" fill="#ffffff" stroke="#12213f" stroke-width="3" rx="10"/>
  <circle cx="198" cy="166" r="20" fill="#f59e0b"/>
  <path d="M160 220 L205 180 L235 205 L265 165 L300 220 Z" fill="#16a34a" opacity="0.8"/>
  <text class="eq" x="190" y="310" text-anchor="middle">x in R^(H x W x C)</text>
  <text class="muted" x="190" y="342" text-anchor="middle">spatial tensor</text>

  <rect x="468" y="130" width="150" height="95" fill="#ffffff" stroke="#12213f" stroke-width="3" rx="10"/>
  <rect x="485" y="145" width="150" height="95" fill="#dbeafe" stroke="#2563eb" stroke-width="3" rx="10"/>
  <rect x="502" y="160" width="150" height="95" fill="#ecfeff" stroke="#0891b2" stroke-width="3" rx="10"/>
  <line x1="448" y1="275" x2="652" y2="275" stroke="#637083" stroke-width="3"/>
  <circle cx="470" cy="275" r="8" class="accent"/>
  <circle cx="525" cy="275" r="8" class="teal"/>
  <circle cx="580" cy="275" r="8" class="amber"/>
  <circle cx="635" cy="275" r="8" class="green"/>
  <text class="eq" x="550" y="310" text-anchor="middle">x in R^(T x H x W x C)</text>
  <text class="muted" x="550" y="342" text-anchor="middle">space-time tensor</text>

  <polyline points="810,260 850,220 890,230 930,170 970,185 1010,135" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <circle cx="810" cy="260" r="10" class="accent"/>
  <circle cx="850" cy="220" r="10" class="teal"/>
  <circle cx="890" cy="230" r="10" class="amber"/>
  <circle cx="930" cy="170" r="10" class="green"/>
  <circle cx="970" cy="185" r="10" class="red"/>
  <circle cx="1010" cy="135" r="10" class="accent"/>
  <line x1="805" y1="295" x2="1015" y2="295" stroke="#637083" stroke-width="3"/>
  <text class="eq" x="910" y="330" text-anchor="middle">x in R^(T_h x D_a)</text>
  <text class="muted" x="910" y="362" text-anchor="middle">action sequence</text>

  <line class="line" x1="340" y1="420" x2="505" y2="420"/>
  <line class="line" x1="760" y1="420" x2="595" y2="420"/>
  <rect x="355" y="452" width="390" height="56" fill="#ffffff" stroke="#2563eb" stroke-width="3" rx="12"/>
  <text class="head" x="550" y="488" text-anchor="middle">same recipe</text>
</svg>
