<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">DDPM ancestral sampling loop</title>
  <desc id="desc">Start from Gaussian noise; then for each diffusion step k from K down to 1, predict the noise, compute the reverse mean, and sample the next less-noisy state; finally return the clean sample x0.</desc>
  <defs>
    <marker id="ar" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#12213f"/>
    </marker>
    <style>
      .bg   { fill: #f8fbff; }
      .start{ fill: #ecfdf5; stroke: #059669; stroke-width: 2.5; }
      .step { fill: #f1f7ff; stroke: #2563eb; stroke-width: 2.5; }
      .dec  { fill: #fffbeb; stroke: #b45309; stroke-width: 2.5; }
      .end  { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; }
      .lbl  { font: 700 23px sans-serif; fill: #12213f; }
      .num  { font: 800 23px sans-serif; fill: #2563eb; }
      .ann  { font: 600 18px sans-serif; fill: #637083; }
      .flow { stroke: #12213f; stroke-width: 2.5; fill: none; marker-end: url(#ar); }
      .loop { stroke: #637083; stroke-width: 2.5; fill: none; stroke-dasharray: 7 6; marker-end: url(#ar); }
    </style>
  </defs>
  <rect class="bg" width="900" height="560"/>

  <!-- 1. initial noise -->
  <rect class="start" x="300" y="22" width="300" height="62" rx="14"/>
  <text class="lbl" x="450" y="60" text-anchor="middle"><tspan class="num">1.</tspan> Sample noise x_K</text>

  <!-- decision -->
  <polygon class="dec" points="450,104 620,158 450,212 280,158"/>
  <text class="lbl" x="450" y="165" text-anchor="middle">for k = K … 1 ?</text>
  <text class="ann" x="636" y="162" text-anchor="start">no &#8594; return</text>
  <text class="ann" x="450" y="238" text-anchor="middle">yes</text>

  <!-- 2a -->
  <rect class="step" x="290" y="250" width="320" height="56" rx="12"/>
  <text class="lbl" x="450" y="285" text-anchor="middle"><tspan class="num">2a.</tspan> Predict the noise</text>

  <!-- 2b -->
  <rect class="step" x="290" y="330" width="320" height="56" rx="12"/>
  <text class="lbl" x="450" y="365" text-anchor="middle"><tspan class="num">2b.</tspan> Reverse mean</text>

  <!-- 2c -->
  <rect class="step" x="290" y="410" width="320" height="56" rx="12"/>
  <text class="lbl" x="450" y="445" text-anchor="middle"><tspan class="num">2c.</tspan> Sample next state</text>

  <!-- 3 return -->
  <rect class="end" x="690" y="130" width="180" height="56" rx="12"/>
  <text class="lbl" x="780" y="165" text-anchor="middle"><tspan class="num">3.</tspan> Return x_0</text>

  <!-- main flow arrows -->
  <path class="flow" d="M450,84 L450,100"/>
  <path class="flow" d="M450,212 L450,246"/>
  <path class="flow" d="M450,306 L450,326"/>
  <path class="flow" d="M450,386 L450,406"/>

  <!-- no branch -->
  <path class="flow" d="M620,158 L688,158"/>

  <!-- loop back -->
  <path class="loop" d="M290,438 L210,438 L210,158 L278,158"/>
  <text class="ann" x="196" y="300" text-anchor="middle" transform="rotate(-90 196 300)">k &#8592; k &#8722; 1</text>
</svg>
