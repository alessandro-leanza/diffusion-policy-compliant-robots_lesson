<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img" aria-label="Closed form noising as reparameterization">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #d8e2f0; stroke-width: 3; rx: 14; }
      .soft { fill: #f1f7ff; stroke: #d8e2f0; stroke-width: 3; rx: 14; }
      .label { font: 700 28px Inter, Arial, sans-serif; fill: #12213f; }
      .small { font: 500 21px Inter, Arial, sans-serif; fill: #42526b; }
      .math { font: 600 25px Inter, Arial, sans-serif; fill: #12213f; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 10 9; }
    </style>
  </defs>

  <rect x="35" y="70" width="190" height="105" class="box"/>
  <text x="130" y="114" text-anchor="middle" class="label">clean sample</text>
  <text x="130" y="148" text-anchor="middle" class="math">x<tspan baseline-shift="sub" font-size="16">0</tspan></text>

  <rect x="35" y="255" width="190" height="105" class="box"/>
  <text x="130" y="299" text-anchor="middle" class="label">random noise</text>
  <text x="130" y="333" text-anchor="middle" class="math">&#949; ~ N(0, I)</text>

  <rect x="330" y="120" width="255" height="170" class="soft"/>
  <text x="457.5" y="165" text-anchor="middle" class="label">deterministic mix</text>
  <text x="457.5" y="207" text-anchor="middle" class="math">&#8730;&#945;&#772;<tspan baseline-shift="sub" font-size="15">k</tspan> x<tspan baseline-shift="sub" font-size="15">0</tspan></text>
  <text x="457.5" y="245" text-anchor="middle" class="math">+ &#8730;(1 - &#945;&#772;<tspan baseline-shift="sub" font-size="15">k</tspan>) &#949;</text>

  <rect x="690" y="155" width="175" height="105" class="box"/>
  <text x="777.5" y="199" text-anchor="middle" class="label">noisy sample</text>
  <text x="777.5" y="233" text-anchor="middle" class="math">x<tspan baseline-shift="sub" font-size="16">k</tspan></text>

  <path d="M230 122 C270 128 288 158 318 178" class="arrow"/>
  <path d="M230 307 C270 302 292 260 318 235" class="arrow"/>
  <path d="M592 205 L678 205" class="arrow"/>

  <path d="M130 183 C130 212 130 226 130 248" class="dash"/>
  <text x="457" y="380" text-anchor="middle" class="small">Given x<tspan baseline-shift="sub" font-size="14">0</tspan>, k, and &#949;, x<tspan baseline-shift="sub" font-size="14">k</tspan> is obtained directly. No simulated forward chain is needed.</text>
</svg>
