<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Control loop latency budget</title>
  <desc id="desc">Robot control latency includes sensing, encoding, denoising, communication, and low-level tracking.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fbff; }
      .label { font: 700 28px sans-serif; fill: #12213f; }
      .body { font: 500 20px sans-serif; fill: #1f2937; }
      .small { font: 500 17px sans-serif; fill: #637083; }
      .mono { font: 700 20px monospace; fill: #12213f; }
      .box { stroke-width: 3; rx: 12; }
      .a { fill: #dbeafe; stroke: #2563eb; }
      .b { fill: #e0f2fe; stroke: #0891b2; }
      .c { fill: #fffbeb; stroke: #f59e0b; }
      .d { fill: #ecfdf5; stroke: #16a34a; }
      .e { fill: #fef2f2; stroke: #dc2626; }
      .line { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1100" height="520"/>
  <text class="label" x="550" y="62" text-anchor="middle">One policy query must fit inside a robot timing budget</text>

  <rect class="box a" x="70" y="160" width="150" height="100"/>
  <text class="body" x="145" y="200" text-anchor="middle">sense</text>
  <text class="small" x="145" y="232" text-anchor="middle">camera, F/T</text>
  <path class="line" d="M220 210 L270 210"/>

  <rect class="box b" x="270" y="160" width="150" height="100"/>
  <text class="body" x="345" y="200" text-anchor="middle">encode</text>
  <text class="small" x="345" y="232" text-anchor="middle">obs context</text>
  <path class="line" d="M420 210 L470 210"/>

  <rect class="box c" x="470" y="130" width="190" height="160"/>
  <text class="body" x="565" y="184" text-anchor="middle">denoise</text>
  <text class="mono" x="565" y="222" text-anchor="middle">K * T_net</text>
  <text class="small" x="565" y="256" text-anchor="middle">dominant term</text>
  <path class="line" d="M660 210 L710 210"/>

  <rect class="box d" x="710" y="160" width="150" height="100"/>
  <text class="body" x="785" y="200" text-anchor="middle">select</text>
  <text class="small" x="785" y="232" text-anchor="middle">first actions</text>
  <path class="line" d="M860 210 L910 210"/>

  <rect class="box e" x="910" y="160" width="150" height="100"/>
  <text class="body" x="985" y="200" text-anchor="middle">execute</text>
  <text class="small" x="985" y="232" text-anchor="middle">controller</text>

  <rect x="235" y="360" width="630" height="66" fill="#ffffff" stroke="#d8e2f0" stroke-width="2" rx="12"/>
  <text class="mono" x="550" y="388" text-anchor="middle">T_query = T_sense + T_enc + K T_net + T_comm</text>
  <text class="small" x="550" y="417" text-anchor="middle">Average speed is not enough: worst-case latency and jitter matter in contact.</text>
</svg>
