<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="340" viewBox="0 0 1400 340" role="img" aria-labelledby="title desc">
  <title id="title">Behavioral cloning pipeline</title>
  <desc id="desc">Expert demonstrations become supervised observation-action pairs; the policy predicts actions, a loss compares them to the expert targets, and its gradient updates the policy.</desc>
  <defs>
    <marker id="bcarrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L11,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="bcfeed" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L11,6 L2,10 Z" fill="#637083"/>
    </marker>
    <style>
      .bg { fill: #f8fbff; }
      .box { fill: #ffffff; stroke: #d8e2f0; stroke-width: 2.5; }
      .teal { fill: #e0f2fe; stroke: #0891b2; stroke-width: 2.5; }
      .amber { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2.5; }
      .flow { stroke: #2563eb; stroke-width: 4.5; fill: none; marker-end: url(#bcarrow); }
      .feed { stroke: #637083; stroke-width: 3.5; fill: none; stroke-dasharray: 10 8; marker-end: url(#bcfeed); }
      .label { font: 700 27px sans-serif; fill: #12213f; }
      .small { font: 500 20px sans-serif; fill: #637083; }
      .mono { font: 700 24px monospace; fill: #12213f; }
      .demo { stroke: #0891b2; stroke-width: 6; fill: none; stroke-linecap: round; }
      .dot { fill: #2563eb; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="340"/>

  <!-- 1. Expert -->
  <rect class="box" x="40" y="50" width="250" height="150"/>
  <text class="label" x="165" y="100" text-anchor="middle">Expert</text>
  <text class="small" x="165" y="132" text-anchor="middle">demonstrates the task</text>
  <path class="demo" d="M95 168 C130 138 150 188 185 158"/>
  <circle class="dot" cx="95" cy="168" r="6"/>
  <circle class="dot" cx="185" cy="158" r="6"/>

  <!-- 2. Dataset -->
  <rect class="teal" x="360" y="50" width="270" height="150"/>
  <text class="label" x="495" y="100" text-anchor="middle">Dataset</text>
  <text class="mono"  x="495" y="140" text-anchor="middle">{ (o_t, a_t) }</text>
  <text class="small" x="495" y="172" text-anchor="middle">supervised pairs</text>

  <!-- 3. Policy -->
  <rect class="box" x="700" y="50" width="260" height="150"/>
  <text class="label" x="830" y="100" text-anchor="middle">Policy</text>
  <text class="mono"  x="830" y="140" text-anchor="middle">π_θ(o_t) → â_t</text>
  <text class="small" x="830" y="172" text-anchor="middle">predict action</text>

  <!-- 4. Loss -->
  <rect class="amber" x="1030" y="50" width="330" height="150"/>
  <text class="label" x="1195" y="98" text-anchor="middle">BC objective</text>
  <text class="mono"  x="1195" y="140" text-anchor="middle">‖ π_θ(o_t) − a_t ‖²</text>
  <text class="small" x="1195" y="172" text-anchor="middle">prediction vs. target a_t</text>

  <!-- forward arrows -->
  <path class="flow" d="M290 125 L356 125"/>
  <path class="flow" d="M630 125 L696 125"/>
  <path class="flow" d="M960 125 L1026 125"/>

  <!-- feedback: gradient updates the policy -->
  <path class="feed" d="M1195 200 C1195 300 830 300 830 204"/>
  <text class="small" x="1012" y="328" text-anchor="middle">gradient step — update θ</text>
</svg>
