<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 430" role="img" aria-label="Same denoising network used by DDPM and DDIM samplers">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #d8e2f0; stroke-width: 3; rx: 14; }
      .soft { fill: #f1f7ff; stroke: #d8e2f0; stroke-width: 3; rx: 14; }
      .ddpm { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 14; }
      .ddim { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 14; }
      .label { font: 700 27px Inter, Arial, sans-serif; fill: #12213f; }
      .small { font: 500 20px Inter, Arial, sans-serif; fill: #42526b; }
      .math { font: 700 25px Inter, Arial, sans-serif; fill: #12213f; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); }
      .arrow2 { fill: none; stroke: #0891b2; stroke-width: 4; marker-end: url(#arrow-cyan); }
    </style>
  </defs>

  <rect x="55" y="150" width="230" height="120" class="box"/>
  <text x="170" y="197" text-anchor="middle" class="label">trained denoiser</text>
  <text x="170" y="235" text-anchor="middle" class="math">&#949;<tspan baseline-shift="sub" font-size="15">&#952;</tspan>(x<tspan baseline-shift="sub" font-size="15">k</tspan>, k, c)</text>

  <rect x="365" y="55" width="220" height="120" class="ddpm"/>
  <text x="475" y="102" text-anchor="middle" class="label">DDPM sampler</text>
  <text x="475" y="139" text-anchor="middle" class="small">many small stochastic steps</text>

  <rect x="365" y="255" width="220" height="120" class="ddim"/>
  <text x="475" y="302" text-anchor="middle" class="label">DDIM sampler</text>
  <text x="475" y="339" text-anchor="middle" class="small">fewer deterministic steps</text>

  <rect x="675" y="150" width="190" height="120" class="soft"/>
  <text x="770" y="197" text-anchor="middle" class="label">action chunk</text>
  <text x="770" y="235" text-anchor="middle" class="small">same policy output type</text>

  <path d="M290 192 C325 162 335 125 353 115" class="arrow"/>
  <path d="M290 228 C325 258 335 295 353 315" class="arrow2"/>
  <path d="M590 115 C640 130 655 165 665 190" class="arrow"/>
  <path d="M590 315 C640 300 655 255 665 230" class="arrow2"/>

  <text x="460" y="415" text-anchor="middle" class="small">Changing the sampler changes the trajectory through diffusion time, not the network weights.</text>
</svg>
