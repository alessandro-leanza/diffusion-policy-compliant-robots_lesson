<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Demonstrations to control pipeline schematic">
  <rect width="1200" height="720" rx="24" fill="#f8fbff"/>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="44" y="120" width="238" height="178" rx="18" fill="#ffffff" stroke="#d8e2f0" stroke-width="4"/>
  <rect x="337" y="120" width="238" height="178" rx="18" fill="#ffffff" stroke="#d8e2f0" stroke-width="4"/>
  <rect x="630" y="120" width="238" height="178" rx="18" fill="#ffffff" stroke="#d8e2f0" stroke-width="4"/>
  <rect x="923" y="120" width="238" height="178" rx="18" fill="#ffffff" stroke="#d8e2f0" stroke-width="4"/>

  <text x="163" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">Expert</text>
  <text x="163" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">demos</text>
  <text x="163" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#637083">timing, recovery,</text>
  <text x="163" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#637083">contact strategy</text>

  <text x="456" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">Learned</text>
  <text x="456" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">policy</text>
  <text x="456" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#2563eb">
    <tspan font-style="italic">&#960;</tspan><tspan baseline-shift="sub" font-size="25">&#952;</tspan><tspan>(a | o)</tspan>
  </text>

  <text x="749" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">Controller</text>
  <text x="749" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">interface</text>
  <text x="749" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#637083">bounds, latency,</text>
  <text x="749" y="391" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#637083">compliance</text>

  <text x="1042" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">Robot</text>
  <text x="1042" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#12213f">task</text>
  <line x1="985" y1="368" x2="1095" y2="368" stroke="#64748b" stroke-width="12" stroke-linecap="round"/>
  <rect x="1063" y="310" width="42" height="116" rx="12" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="3"/>
  <circle cx="1018" cy="368" r="35" fill="#e0f2fe" stroke="#0891b2" stroke-width="7"/>
  <text x="1042" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" fill="#637083">push object</text>

  <line x1="292" y1="209" x2="327" y2="209" stroke="#2563eb" stroke-width="7" marker-end="url(#arrow)"/>
  <line x1="585" y1="209" x2="620" y2="209" stroke="#2563eb" stroke-width="7" marker-end="url(#arrow)"/>
  <line x1="878" y1="209" x2="913" y2="209" stroke="#2563eb" stroke-width="7" marker-end="url(#arrow)"/>

  <rect x="126" y="572" width="948" height="70" rx="18" fill="#dbeafe" stroke="#aac4e8" stroke-width="4"/>
  <text x="600" y="616" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#12213f">Learning proposes behavior; control makes it physical.</text>
</svg>
